<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Farm Monitor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div>
          <p class="eyebrow">定点観測ダッシュボード</p>
          <h1>Farm Monitor</h1>
        </div>
        <div class="status-pill" id="dataStatus">読み込み中</div>
      </div>
    </header>

    <main class="dashboard">
      <section class="summary-section" aria-labelledby="current-title">
        <div class="section-heading">
          <h2 id="current-title">現在の観測値</h2>
          <p id="lastUpdated">更新日時: --</p>
        </div>
        <div class="metric-grid" id="metricGrid" aria-live="polite"></div>
      </section>

      <section class="content-grid">
        <article class="panel image-panel">
          <div class="panel-heading">
            <h2>最新画像</h2>
            <p id="imageTimestamp">images/latest.jpg</p>
          </div>
          <div class="image-frame">
            <img id="latestImage" alt="農場の最新画像" hidden>
            <div class="no-image" id="noImage">No Image</div>
          </div>
        </article>

        <article class="panel chart-panel">
          <div class="panel-heading">
            <h2>温度・湿度</h2>
            <p>data/ith11b_log.csv</p>
          </div>
          <div class="chart-wrap">
            <canvas id="environmentChart" aria-label="温度と湿度の推移グラフ"></canvas>
          </div>
        </article>
      </section>

      <section class="panel chart-panel">
        <div class="panel-heading">
          <h2>通信・電源</h2>
          <p>RSSI とバッテリー残量</p>
        </div>
        <div class="chart-wrap short">
          <canvas id="healthChart" aria-label="RSSIとバッテリー残量の推移グラフ"></canvas>
        </div>
      </section>
    </main>
  </body>
</html>
